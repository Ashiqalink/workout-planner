{% extends "base.html" %}

{% block title %}Exercise Library – FitTrack{% endblock %}

{% block content %}
<div class="library-page">

    <!-- Header -->
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:15px;margin-bottom:24px;">
        <div>
            <div class="breadcrumb">
                <a href="{{ url_for('index') }}">Home</a> › Library
            </div>
            <h1>📚 Exercise Library</h1>
            <p>Browse all exercises across 5 training domains</p>
        </div>
        <button class="btn btn-primary" onclick="toggleAddExerciseForm()" style="display:flex;align-items:center;gap:8px;">
            <i class="icon-xl" data-lucide="plus"></i> Add Custom Exercise
        </button>
    </div>

    <!-- Custom Exercise Form (Hidden by default) -->
    <div class="card hidden" id="add-exercise-panel" style="margin-bottom:24px;">
        <h3 style="font-family:var(--font-head);margin-bottom:16px;">Add Custom Exercise</h3>
        <form id="add-exercise-form">
            <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px;margin-bottom:15px;">
                <div class="form-group">
                    <label for="ex-name">Exercise Name</label>
                    <input type="text" id="ex-name" class="form-control" placeholder="e.g. Diamond Push-ups" required>
                </div>
                <div class="form-group">
                    <label for="ex-category">Domain</label>
                    <select id="ex-category" class="form-control" required>
                        <option value="Strength & Power">Strength & Power</option>
                        <option value="Speed & Mobility">Speed & Mobility</option>
                        <option value="Endurance">Endurance</option>
                        <option value="Agility">Agility</option>
                        <option value="Cognition">Cognition</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ex-difficulty">Difficulty</label>
                    <select id="ex-difficulty" class="form-control" required>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ex-duration">Duration (minutes)</label>
                    <input type="number" id="ex-duration" class="form-control" step="0.1" min="0.1" value="1.0" required>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;">
                <div class="form-group">
                    <label for="ex-muscles">Target Muscles (optional)</label>
                    <input type="text" id="ex-muscles" class="form-control" placeholder="e.g. Chest, triceps">
                </div>
                <div class="form-group">
                    <label for="ex-desc">Description (optional)</label>
                    <input type="text" id="ex-desc" class="form-control" placeholder="e.g. Targets inner chest and arm strength">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label for="ex-instructions">Instructions (optional)</label>
                <textarea id="ex-instructions" class="form-control" rows="3" placeholder="Step 1... Step 2..."></textarea>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:10px;">
                <button type="button" class="btn btn-ghost" onclick="toggleAddExerciseForm()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Exercise</button>
            </div>
        </form>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
        <span style="color:var(--text-light);font-size:1.05rem;">🔍</span>
        <input type="text" id="search-input" placeholder="Search by name, muscles, or description…">
        <button class="btn btn-sm btn-primary" onclick="performSearch()" id="search-btn">Search</button>
        <button class="btn btn-sm btn-ghost" onclick="clearSearch()">Clear</button>
    </div>

    <!-- Filter pills -->
    <div>
        <div class="filter-pills" id="category-pills">
            <button class="filter-pill active" data-value="" onclick="setFilter('category','',this)">All
                Domains</button>
            <button class="filter-pill" data-value="Strength & Power"
                onclick="setFilter('category','Strength &amp; Power',this)"> Strength</button>
            <button class="filter-pill" data-value="Speed & Mobility"
                onclick="setFilter('category','Speed &amp; Mobility',this)"> Speed</button>
            <button class="filter-pill" data-value="Endurance" onclick="setFilter('category','Endurance',this)">
                Endurance</button>
            <button class="filter-pill" data-value="Agility" onclick="setFilter('category','Agility',this)">
                Agility</button>
            <button class="filter-pill" data-value="Cognition" onclick="setFilter('category','Cognition',this)">
                Cognition</button>
        </div>
        <div class="filter-pills" id="difficulty-pills">
            <button class="filter-pill active" data-value="" onclick="setFilter('difficulty','',this)">All
                Levels</button>
            <button class="filter-pill" data-value="beginner" onclick="setFilter('difficulty','beginner',this)">🟢
                Beginner</button>
            <button class="filter-pill" data-value="intermediate"
                onclick="setFilter('difficulty','intermediate',this)">🟡 Intermediate</button>
            <button class="filter-pill" data-value="advanced" onclick="setFilter('difficulty','advanced',this)">🔴
                Advanced</button>
        </div>
    </div>

    <!-- Results info -->
    <div class="results-info" id="results-count"></div>

    <!-- Grid -->
    <div class="exercises-grid" id="exercises-container">
        <div class="card-flat" style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-muted);">
            <div class="spinner" style="margin:0 auto 12px;"></div>
            <p>Loading exercises…</p>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    let allExercises = [];
    let activeCategory = '';
    let activeDifficulty = '';
    let searchTerm = '';

    document.addEventListener('DOMContentLoaded', function () {
        loadLibraryExercises();

        const inp = document.getElementById('search-input');
        inp.addEventListener('input', function () {
            if (this.value.trim() === '') { searchTerm = ''; applyAll(); }
        });
        inp.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') performSearch();
        });

        // Add exercise form submit
        document.getElementById('add-exercise-form').addEventListener('submit', function(e) {
            e.preventDefault();
            saveCustomExercise();
        });
    });

    function toggleAddExerciseForm() {
        const panel = document.getElementById('add-exercise-panel');
        panel.classList.toggle('hidden');
    }

    function saveCustomExercise() {
        const name = document.getElementById('ex-name').value;
        const category = document.getElementById('ex-category').value;
        const difficulty = document.getElementById('ex-difficulty').value;
        const duration = parseFloat(document.getElementById('ex-duration').value);
        const target_muscles = document.getElementById('ex-muscles').value;
        const description = document.getElementById('ex-desc').value;
        const instructions = document.getElementById('ex-instructions').value;

        fetch('/api/exercises/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, category, difficulty, duration, target_muscles, description, instructions })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (window.showToast) showToast('Custom exercise added successfully!', 'success');
                allExercises.push(data.exercise);
                applyAll();
                document.getElementById('add-exercise-form').reset();
                toggleAddExerciseForm();
            } else {
                if (window.showToast) showToast('Error: ' + data.error, 'error');
            }
        })
        .catch(() => {
            if (window.showToast) showToast('Network error saving exercise.', 'error');
        });
    }

    function loadLibraryExercises() {
        fetch('/api/exercises')
            .then(r => r.json())
            .then(data => {
                if (!data.exercises) return;
                allExercises = data.exercises;
                applyAll();
            })
            .catch(() => {
                const container = document.getElementById('exercises-container');
                container.innerHTML =
                    '<div class="no-results error-message"><div class="no-results-icon"><i class="icon-4xl icon-danger" data-lucide="alert-triangle" ></i></div><p>Could not load exercises. Please refresh.</p></div>';
                lucide.createIcons({ root: container });
            });
    }
    function setFilter(type, value, btn) {
        if (type === 'category') {
            activeCategory = value;
            document.querySelectorAll('#category-pills .filter-pill').forEach(p => p.classList.remove('active'));
        } else {
            activeDifficulty = value;
            document.querySelectorAll('#difficulty-pills .filter-pill').forEach(p => p.classList.remove('active'));
        }
        btn.classList.add('active');
        searchTerm = '';
        document.getElementById('search-input').value = '';
        applyAll();
    }
    function performSearch() {
        searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
        applyAll();
    }
    function clearSearch() {
        searchTerm = '';
        document.getElementById('search-input').value = '';
        applyAll();
    }
    function applyAll() {
        let result = allExercises;
        if (activeCategory) result = result.filter(e => e.category === activeCategory);
        if (activeDifficulty) result = result.filter(e => e.difficulty === activeDifficulty);
        if (searchTerm) {
            result = result.filter(e => {
                const haystack = [e.name, e.description, e.instructions, e.target_muscles || ''].join(' ').toLowerCase();
                return haystack.includes(searchTerm);
            });
        }
        displayExercises(result);
        updateCount(result.length);
    }

    function displayExercises(exercises) {
        const container = document.getElementById('exercises-container');
        if (exercises.length === 0) {
            container.innerHTML = '<div class="no-results" style="grid-column:1/-1"><div class="no-results-icon"><i class="icon-4xl icon-muted" data-lucide="search" ></i></div><p>No exercises match your filters.</p></div>';
            lucide.createIcons({ root: container });
            return;
        }
        container.innerHTML = '';
        exercises.forEach((ex, i) => {
            const card = createExerciseCard(ex, i);
            container.appendChild(card);
        });
    }

    function getCategoryAccent(cat) {
        const map = { 'Strength & Power': 'strength', 'Speed & Mobility': 'speed', 'Endurance': 'endurance', 'Agility': 'agility', 'Cognition': 'cognition' };
        return map[cat] || 'primary';
    }

    function getDifficultyBadge(diff) {
        if (diff === 'beginner') return 'badge-beginner';
        if (diff === 'intermediate') return 'badge-intermediate';
        if (diff === 'advanced') return 'badge-advanced';
        return 'badge-neutral';
    }

    function createExerciseCard(ex, idx) {
        const card = document.createElement('div');
        card.className = 'exercise-card';
        card.style.animationDelay = (idx * 0.04) + 's';
        const accent = getCategoryAccent(ex.category);
        const durationSec = Math.round(ex.duration * 60);

        const escaped = {
            name: ex.name.replace(/'/g, "\\'"),
            instructions: (ex.instructions || '').replace(/'/g, "\\'").substring(0, 120)
        };

        card.innerHTML = `
        <div class="exercise-card-body">
            <div class="exercise-header">
                <h3>${ex.name}</h3>
                <span class="badge badge-${accent}">${ex.category}</span>
            </div>
            <div class="exercise-meta">
                <p><strong>Duration:</strong> ${durationSec}s</p>
                <p><strong>Difficulty:</strong> <span class="badge ${getDifficultyBadge(ex.difficulty)}">${ex.difficulty}</span></p>
                ${ex.target_muscles ? `<p><strong>Muscles:</strong> ${ex.target_muscles}</p>` : ''}
                ${ex.description ? `<p style="margin-top:6px;font-style:italic;">${ex.description}</p>` : ''}
            </div>
            ${ex.instructions ? `
            <div class="exercise-instructions">
                <h4>Instructions</h4>
                <p>${ex.instructions}</p>
            </div>` : ''}
        </div>
        <div class="exercise-actions">
            <button class="btn btn-sm btn-outline" onclick="addToWorkout('${escaped.name}')">+ Add to Workout</button>
        </div>
    `;
        return card;
    }

    function updateCount(count) {
        const el = document.getElementById('results-count');
        const total = allExercises.length;
        el.textContent = count === total ? `Showing all ${total} exercises` : `Showing ${count} of ${total} exercises`;
    }

    function addToWorkout(name) {
        if (window.showToast) showToast(`"${name}" added to your workout list.`, 'success');
    }
</script>
{% endblock %}
