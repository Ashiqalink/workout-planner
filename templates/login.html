{% extends "base.html" %}

{% block title %}Login – FitTrack{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>⚡ FitTrack</h1>
                <p>Welcome back! Sign in to continue your training journey.</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter your username or email" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="input-toggle-btn" onclick="togglePwd('password', this)"
                            aria-label="Show password">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In →</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
                <p><a href="{{ url_for('index') }}" style="color:var(--text-light);">Continue as Guest</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁️';
    }
}

document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
});
</script>
{% endblock %}
